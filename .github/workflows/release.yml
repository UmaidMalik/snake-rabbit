name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  linux:
    name: Build Linux release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcursor-dev \
            libxinerama-dev

      - name: Generate Makefiles
        run: |
          chmod +x build/premake5
          cd build
          ./premake5 gmake

      - name: Build Release
        run: make config=release_x64 -j"$(nproc)"

      - name: Package Linux build
        run: |
          package="snake-rabbit-${GITHUB_REF_NAME}-linux-x86_64"
          mkdir -p "release/$package"

          executable="$(find bin -type f -executable \
            ! -name '*.so' \
            | head -n 1)"

          if [ -z "$executable" ]; then
            echo "Linux executable not found"
            find bin -type f -print
            exit 1
          fi

          cp "$executable" "release/$package/snake-rabbit"
          cp -r resources "release/$package/resources"

          [ -f README.md ] && cp README.md "release/$package/"
          [ -f GAME_MANUAL.md ] && cp GAME_MANUAL.md "release/$package/"
          [ -f LICENSE ] && cp LICENSE "release/$package/"

          cd release
          tar -czf "$package.tar.gz" "$package"

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: release/*.tar.gz
          if-no-files-found: error

  windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Generate Visual Studio solution
        shell: cmd
        run: build-VisualStudio2022.bat

      - name: Build Release
        shell: pwsh
        run: |
          $solution = Get-ChildItem -Recurse -Filter *.sln |
            Select-Object -First 1

          if (-not $solution) {
            throw "No Visual Studio solution found."
          }

          msbuild $solution.FullName `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64

      - name: Package Windows build
        shell: pwsh
        run: |
          $package = "snake-rabbit-${{ github.ref_name }}-windows-x86_64"
          $directory = "release/$package"

          New-Item -ItemType Directory -Force -Path $directory

          $executable = Get-ChildItem -Path bin -Recurse -Filter *.exe |
            Select-Object -First 1

          if (-not $executable) {
            Get-ChildItem -Path bin -Recurse -File
            throw "Windows executable not found."
          }

          Copy-Item $executable.FullName "$directory/snake-rabbit.exe"
          Copy-Item resources "$directory/resources" -Recurse

          if (Test-Path README.md) {
            Copy-Item README.md $directory
          }

          if (Test-Path GAME_MANUAL.md) {
            Copy-Item GAME_MANUAL.md $directory
          }

          if (Test-Path LICENSE) {
            Copy-Item LICENSE $directory
          }

          Get-ChildItem -Path bin -Recurse -Filter *.dll |
            ForEach-Object {
              Copy-Item $_.FullName $directory
            }

          Compress-Archive `
            -Path $directory `
            -DestinationPath "release/$package.zip"

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/*.zip
          if-no-files-found: error

  web:
    name: Build WebAssembly release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Download raylib
        run: |
          git clone \
            --depth 1 \
            https://github.com/raysan5/raylib.git \
            build/external/raylib-master

      - name: Build WebAssembly
        run: |
          chmod +x build-web.sh
          ./build-web.sh

      - name: Package WebAssembly build
        run: |
          package="snake-rabbit-${GITHUB_REF_NAME}-web"

          mkdir -p "release/$package"
          cp -r bin/Web/. "release/$package/"

          [ -f README.md ] && cp README.md "release/$package/"
          [ -f LICENSE ] && cp LICENSE "release/$package/"

          cd release
          zip -r "$package.zip" "$package"

      - name: Upload WebAssembly package
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: release/*.zip
          if-no-files-found: error

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: bin/Web

  deploy-pages:
    name: Deploy WebAssembly to GitHub Pages
    needs:
      - web

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish:
    name: Publish GitHub release
    needs:
      - linux
      - windows
      - web

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release-assets

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets

      - name: Download WebAssembly package
        uses: actions/download-artifact@v4
        with:
          name: web-release
          path: release-assets

      - name: Inspect release assets
        run: find release-assets -type f -print

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/* \
            --title "Snake & Rabbit ${GITHUB_REF_NAME}" \
            --generate-notes
